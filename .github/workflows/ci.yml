name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify Node 24
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint changed lines in pull request
        if: github.event_name == 'pull_request'
        run: npm run lint-diff "${{ github.event.pull_request.base.sha }}...${{ github.event.pull_request.head.sha }}"

      - name: Lint changed lines in push
        if: github.event_name == 'push' && github.event.before != '0000000000000000000000000000000000000000'
        run: npm run lint-diff "${{ github.event.before }}...${{ github.sha }}"

      - name: Build application
        run: npm run build

      - name: Run unit tests
        run: npx ava --concurrency=5
